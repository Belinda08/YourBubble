<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pause and Breathe</title>
    <!-- change font later -->
    <link rel="stylesheet" href="Starting_Page.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
<link rel="icon" href="logo.png" type="image/x-icon">
</head>
<body>
    <!-- breathing screen -->
    <div id="breathingScreen" class="screen visible">
    <canvas id="bubbleCanvas"></canvas>
    <button id="skipBtn">Skip</button>
</div>
    <!-- auth choice screen -->
    <div id="authChoiceScreen" class="screen hidden">
        <img src="logo.png" alt="Your Bubble" class="auth-logo">
        <h1 style="color:rgb(255, 255, 255); font-size: 48px; padding-bottom: 20px;" class="lobster-two-regular auth-title">Your Bubble</h1>
        <form class="authChoice-form" id="authChoiceForm">
            <h1 style="color:white" class="center-text google-sans-text auth-welcome">Welcome</h1>
            <button type = "button" class = "google-sans-text" id="loginBtn">Login</button>
            <button type = "button" class = "google-sans-text" id="signupBtn">Sign Up</button>
        </form> 
    </div>
    <!-- login screen -->
    <div id="loginScreen" class="screen hidden">
        <form class="login-form" id="loginForm">
            <h2 style="color:white;">Login</h2>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p class="error" id="errorMsg"></p>
        </form>
    </div>
    <!-- sign up screen -->
    <div id="signupScreen" class="screen hidden">
        <form class="signup-form" id="signupForm">
            <h2 style="color:white;">Sign Up</h2>
            <input type="text" id="newUsername" placeholder="Username" required>
            <input type="password" id="newPassword" placeholder="Password" required>
            <input type="password" id="confirmPassword" placeholder="Reenter Password" required>
            <button type="submit">Create Account</button>
            <p id="signupMsg" class="error"></p>
        </form>
    </div>
    <script type="module" src="Starting_Page.js"></script>
</body>
</html>
